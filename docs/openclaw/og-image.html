<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OpenClaw OG Image — 1200x630</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 1200px;
            height: 630px;
            padding: 72px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle grid background */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(251, 191, 36, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251, 191, 36, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Accent glow */
        .card::after {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.12) 0%, transparent 70%);
        }

        .badge {
            display: inline-block;
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            width: fit-content;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        h1 span { color: #fbbf24; }

        .subtitle {
            font-size: 26px;
            color: #94a3b8;
            line-height: 1.5;
            max-width: 700px;
            position: relative;
            z-index: 1;
        }

        .code-hint {
            position: absolute;
            bottom: 60px;
            right: 80px;
            font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
            font-size: 20px;
            color: #475569;
            z-index: 1;
        }

        .code-hint span { color: #fbbf24; }

        .url {
            position: absolute;
            bottom: 60px;
            left: 80px;
            font-size: 18px;
            color: #64748b;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">pip install nostrkey</div>
        <h1>Give Your AI<br>Its Own <span>Identity</span></h1>
        <p class="subtitle">Python SDK for AI entities to generate Nostr keypairs, sign events, and encrypt data.</p>
        <div class="code-hint">bot = Identity.<span>generate</span>()</div>
        <div class="url">loginwithnostr.com/openclaw</div>
    </div>
</body>
</html>
