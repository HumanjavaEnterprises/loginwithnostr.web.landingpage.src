<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent glow -->
  <ellipse cx="600" cy="280" rx="300" ry="200" fill="#fbbf24" opacity="0.04"/>

  <!-- Icon -->
  <circle cx="600" cy="220" r="60" stroke="#fbbf24" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M575 220h50M600 195v50" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="800" fill="#fbbf24">Login with Nostr</text>

  <!-- Subtitle -->
  <text x="600" y="395" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#94a3b8">Add passwordless authentication to any website</text>

  <!-- Code snippet -->
  <rect x="320" y="430" width="560" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="340" y="458" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="16" fill="#94a3b8">&lt;div</text>
  <text x="382" y="458" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="16" fill="#79c0ff"> id</text>
  <text x="403" y="458" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="16" fill="#94a3b8">=</text>
  <text x="413" y="458" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="16" fill="#a5d6ff">"nostr-login"</text>
  <text x="540" y="458" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="16" fill="#94a3b8">&gt;&lt;/div&gt;</text>

  <!-- Badge -->
  <rect x="438" y="500" width="324" height="32" rx="16" fill="#fbbf24" opacity="0.12"/>
  <text x="600" y="522" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#fbbf24">2 lines of code · No backend · Free &amp; open source</text>

  <!-- Footer -->
  <text x="600" y="595" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569">loginwithnostr.com</text>
</svg>
